version: "3.8"

services:
  tpap-ingress-service:
    build:
      context: ./services/tpap-ingress-service
      dockerfile: Dockerfile
    container_name: tpap-ingress-service
    ports:
      - "8080:8080"
    environment:
      # Use the container/service name of Postgres as defined in the actual docker-compose topology.
      # The previous value caused UnknownHostException: orc-postgres.
      POSTGRES_HOST: orc-postgres

      POSTGRES_PORT: 5432
      POSTGRES_DB: orchestrator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

      REDIS_HOST: orc-redis
      REDIS_PORT: 6379

      KAFKA_BOOTSTRAP_SERVERS: orc-kafka:9092

