
# ═══════════════════════════════════════════════════════════════
# APEX-UPI — Infrastructure Services
# Zookeeper + Kafka, Redis, PostgreSQL, WireMock (NPCI mock)
# ═══════════════════════════════════════════════════════════════

services:

  # ── Zookeeper (required by Kafka) ──
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: apex-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "ruok"
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 5"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ──
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: apex-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Redis (Idempotency cache) ──
  redis:
    image: redis:7-alpine
    container_name: apex-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── PostgreSQL (Shared database) ──
  postgres:
    image: postgres:16-alpine
    container_name: apex-postgres
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: apexupi
      POSTGRES_USER: apexupi
      POSTGRES_PASSWORD: apexupi
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - apex-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apexupi -d apexupi"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── WireMock (NPCI Mock) ──
  wiremock:
    image: wiremock/wiremock:3.3.1
    container_name: apex-wiremock
    ports:
      - "9090:8080"
    volumes:
      - ./wiremock:/home/wiremock
    command: --global-response-templating --verbose

volumes:
  apex-pgdata:
