spring.application.name=psp-switch

# Redis Config
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000ms
spring.redis.lettuce.pool.max-active=20

# DLQ Configs
app.dlq.max-retries=3
app.dlq.backoff-initial-ms=2000
app.dlq.backoff-max-ms=32000
app.cbs.fail.credit=true


# JPA / H2 for dev (switch to PostgreSQL profile later)
spring.datasource.url=jdbc:h2:mem:pspswitch;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# Logging - Structured for production
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [%X{txnId}] [%X{state}] %marker - %msg%n
logging.level.com.apexupi.psp_switch=DEBUG

# Idempotency TTL
app.idempotency.ttl=PT24H
# Reconciliation scanner interval (30 seconds)
app.reconciliation.interval-ms=30000

# Idempotency TTL (24 hours)
app.idempotency.ttl=PT24H

# DLQ retry settings
app.dlq.max-retries=3
app.dlq.backoff-initial-ms=2000
app.dlq.backoff-max-ms=32000