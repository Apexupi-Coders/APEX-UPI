server:
  port: 8082

spring:
  application:
    name: orchestrator-cbs

  datasource:
    url: jdbc:h2:mem:orchestrator;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: orchestrator-cbs-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

npci:
  # Orchestrator should POST to NPCI Adapter for callbacks (wire later if needed)
  adapter-base-url: ${NPCI_ADAPTER_BASE_URL:http://localhost:8081}

app:
  kafka:
    topics:
      payment-initiate: ${PSP_PAYMENT_TOPIC:psp.payment.initiate.request}
      balance-inquiry: ${PSP_BALANCE_TOPIC:psp.balance.inquiry.request}
      npci-outbound-request: ${NPCI_OUTBOUND_TOPIC:npci.outbound.request}
      npci-inbound-response: ${NPCI_INBOUND_TOPIC:npci.inbound.response}
      psp-audit-events: ${PSP_AUDIT_TOPIC:psp.audit.events}

logging:
  level:
    com.apexupi.psp_switch: INFO

