server:
  port: 8085

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/psp_rules
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  redis:
    host: localhost
    port: 6379

rules:
  max-transaction-amount: 100000
  daily-limit: 200000
  velocity-limit: 5
  dedup-window-seconds: 30
