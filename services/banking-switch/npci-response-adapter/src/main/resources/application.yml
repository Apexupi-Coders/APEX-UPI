server:
  port: 8083

spring:
  application:
    name: npci-response-adapter
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: npci-response-adapter-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: "com.bankingswitch.orchestrator.model.NpciResponseEvent:com.bankingswitch.npciadapter.model.NpciCallbackEvent"

kafka:
  topic:
    npci-response: upi.bank.npci.response

npci:
  callback-url: ${NPCI_CALLBACK_URL:http://192.168.29.68:9090/upi/callback}
