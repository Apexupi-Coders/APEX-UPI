server.port=8081
spring.application.name=psp-txn-orchestrator

# ═══════════════════════════════════════════
# PostgreSQL — Transaction state + Ledger
# ═══════════════════════════════════════════
spring.datasource.url=jdbc:postgresql://localhost:5434/orchestrator
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ═══════════════════════════════════════════
# Redis — Idempotency cache
# ═══════════════════════════════════════════
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# ═══════════════════════════════════════════
# Kafka — Event-driven consumption
# ═══════════════════════════════════════════
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=psp-orchestrator
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Topic name
app.kafka.topic.payment-requests=upi.txn.requests

# ═══════════════════════════════════════════
# Data Crypto — AES-256 PII encryption at rest
# ═══════════════════════════════════════════
crypto.enabled=true
crypto.secret-key=PSPSwitch2024DemoKey1234567890AB

# ═══════════════════════════════════════════
# Logging
# ═══════════════════════════════════════════
logging.level.com.pspswitch.orchestrator=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level --- %msg%n
