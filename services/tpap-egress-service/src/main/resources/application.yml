server:
  port: 8082

spring:
  application:
    name: tpap-egress-service

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/egress_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id: tpap-egress-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.pspswitch.tpapegress.model.event"

tpap:
  egress:
    kafka:
      topic: psp.switch.completed.events
    webhook:
      timeout-seconds: 5
      log-all-attempts: false
      retry:
        max-attempts: 5
        initial-interval-ms: 1000
        multiplier: 2.0
        max-interval-ms: 10000
