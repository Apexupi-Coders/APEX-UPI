server:
  port: 8083

spring:
  application:
    name: engine-recovery

  datasource:
    url: jdbc:h2:mem:engine-recovery;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

app:
  kafka:
    topics:
      npci-inbound-response: ${NPCI_INBOUND_TOPIC:npci.inbound.response}

logging:
  level:
    com.apexupi.psp_switch: INFO

