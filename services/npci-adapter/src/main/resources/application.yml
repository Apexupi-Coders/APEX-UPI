server:
  port: 8081

spring:
  application:
    name: npci-adapter
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: npci-adapter-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Redis intentionally removed: Adapter is purely event-driven (Kafka→REST→Kafka).
# Orchestrator reacts to Kafka events on npci.inbound.response instead of polling Redis.
# Re-add spring-boot-starter-data-redis if multi-instance idempotency is needed in production.

npci:
  base-url: ${NPCI_BASE_URL:http://localhost:9090}
  org-id: DEMOPSP
  mtls:
    enabled: ${NPCI_MTLS_ENABLED:false}
    keystore-path: ${NPCI_KEYSTORE_PATH:}
    keystore-password: ${NPCI_KEYSTORE_PASSWORD:}
    truststore-path: ${NPCI_TRUSTSTORE_PATH:}
    truststore-password: ${NPCI_TRUSTSTORE_PASSWORD:}

kafka:
  topics:
    outbound-request: npci.outbound.request
    inbound-response: npci.inbound.response

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
