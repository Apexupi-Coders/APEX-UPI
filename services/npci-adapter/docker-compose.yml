version: '3.8'

services:
  npci-adapter:
    platform: linux/amd64
    build: .
    container_name: npci-adapter
    ports:
      - "8081:8081"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      NPCI_BASE_URL: http://wiremock-npci:9090

      # topics (optional override)
      NPCI_OUTBOUND_TOPIC: npci.outbound.request
      NPCI_INBOUND_TOPIC: npci.inbound.response
    depends_on:
      - kafka

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: temp-adapter-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: temp-adapter-zk
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

